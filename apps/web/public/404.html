<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Finkley</title>
    <script>
      // GitHub Pages SPA fallback (rafgraph/spa-github-pages technique).
      // SPA живёт в подпапке /app/ — после промаха надо восстановить путь
      // относительно базы и перейти на /app/?p=<encoded>.
      // index.html (см. <head>) затем уберёт ?p и replaceState'ом вернёт
      // правильный URL — React Router это поймёт.
      var l = window.location
      var BASE = '/app/'
      var pathAfterBase = l.pathname.indexOf(BASE) === 0 ? l.pathname.slice(BASE.length) : ''
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          BASE +
          '?p=' +
          encodeURIComponent(pathAfterBase + l.search) +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
