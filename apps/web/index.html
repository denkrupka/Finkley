<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1A1A2E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Finkley" />
    <meta name="description" content="Finkley — управленческий учёт для салонов красоты. Видишь свою прибыль, а не записи клиентов." />

    <!-- Content Security Policy. unsafe-inline для script нужен для inline-fallback
         и Vite-injected init; для style — для Tailwind/Radix runtime. Все third-party
         origins explicit, чтобы XSS не смог утечь токены на atacker-controlled сервер. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://js.hcaptcha.com https://newassets.hcaptcha.com https://*.hcaptcha.com https://js.stripe.com https://m.stripe.network https://m.stripe.com; connect-src 'self' https://*.supabase.co https://*.functions.supabase.co https://api.hcaptcha.com https://*.hcaptcha.com https://api.stripe.com https://m.stripe.com https://m.stripe.network https://*.sentry.io https://*.ingest.sentry.io https://accounts.google.com https://oauth2.googleapis.com wss://*.supabase.co; style-src 'self' 'unsafe-inline' https://accounts.google.com https://*.hcaptcha.com; img-src 'self' data: blob: https:; font-src 'self' data:; frame-src https://js.stripe.com https://hooks.stripe.com https://*.hcaptcha.com https://newassets.hcaptcha.com https://accounts.google.com; worker-src 'self' blob:; form-action 'self'; base-uri 'self'; object-src 'none';"
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(self), microphone=(), geolocation=(), payment=(self)" />

    <!-- Google Identity Services: используется в GoogleButton для signInWithIdToken,
         чтобы Google показывал «Sign in to Finkley» вместо <ref>.supabase.co.
         Грузим async, чтобы не блокировал рендер. -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- GitHub Pages SPA fallback: восстанавливаем путь после редиректа из 404.html.
         SPA живёт в /app/ (см. vite.config.ts → base), поэтому добавляем base
         к восстанавливаемому пути. BrowserRouter с basename отрежет /app/ обратно. -->
    <script>
      ;(function () {
        var p = new URLSearchParams(window.location.search).get('p')
        if (p) {
          var BASE = '/app/'
          window.history.replaceState(null, '', BASE + p + window.location.hash)
        }
      })()
    </script>

    <title>Finkley</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
