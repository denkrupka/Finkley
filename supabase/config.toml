# Supabase project config — для локальной разработки через `supabase start`.
# Не содержит секретов (они в env-переменных и Function Secrets).

project_id = "finkley"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
# Локальный SMTP-сервер для тестирования email
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173",
  "https://finkley.app",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = false
enable_confirmations = false

# OAuth-провайдеры — настраиваются в Supabase Dashboard, не локально.
# Telegram Login делается через custom edge function (telegram-auth), не через provider.

[functions]
# Edge functions — Deno runtime. Деплой через GitHub Actions (см. .github/workflows/deploy-supabase.yml)

# email-channel-oauth-callback — принимает GET-редирект от Google после
# OAuth consent. Google не передаёт JWT, поэтому verify_jwt=false.
# Сама функция читает state=<salon_id> из query — security гарантирован
# тем что code valid только для нашего client_id/secret.
[functions.email-channel-oauth-callback]
verify_jwt = false

[analytics]
enabled = false

[experimental]
webhooks = { enabled = true }
