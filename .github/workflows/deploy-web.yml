name: Deploy Web (Production)

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/landing/**'
      - '.github/workflows/deploy-web.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
  workflow_dispatch:

# Только один деплой Pages в один момент времени
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (web + landing)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build SPA (apps/web)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PROD }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_PROD }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PK_LIVE }}
          VITE_STRIPE_PRICE_ID: ${{ secrets.VITE_STRIPE_PRICE_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_PLAUSIBLE_DOMAIN: finkley.app
          VITE_TELEGRAM_BOT_USERNAME: ${{ secrets.VITE_TELEGRAM_BOT_USERNAME }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_APP_URL: https://finkley.app/app/
          # Vite base должен быть /app/ — SPA живёт в подпапке рядом с лендингом.
          VITE_BASE: /app/
        run: pnpm --filter web build

      - name: Build landing (apps/landing)
        run: pnpm --filter landing build

      - name: Merge into single Pages directory
        run: |
          mkdir -p public
          cp -r apps/landing/dist/. public/
          mkdir -p public/app
          cp -r apps/web/dist/. public/app/
          # CNAME для GitHub Pages custom domain
          echo "finkley.app" > public/CNAME
          # GitHub Pages читает ТОЛЬКО корневой /404.html для любых 404 на сайте,
          # подпапочные ignored. Поэтому единый смартный fallback в корне:
          # — пути под /app/ → SPA-fallback с сохранением остатка
          # — все прочие → редирект на лендинг /
          cat > public/404.html <<'HTML'
          <!doctype html>
          <html lang="ru">
            <head>
              <meta charset="UTF-8" />
              <title>Finkley</title>
              <script>
                ;(function () {
                  var l = window.location
                  var APP = '/app/'
                  if (l.pathname === APP || l.pathname.indexOf(APP) === 0) {
                    var rest = l.pathname.slice(APP.length)
                    l.replace(
                      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                        APP + '?p=' + encodeURIComponent(rest + l.search) + l.hash
                    )
                  } else {
                    // Лендинг — на главную
                    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/')
                  }
                })()
              </script>
            </head>
            <body></body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
