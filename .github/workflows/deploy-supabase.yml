name: Deploy Supabase (Migrations + Functions)

# Двухступенчатый pipeline: сначала staging, потом prod через GitHub Environment
# с required reviewers (manual approval). Если staging упадёт — prod не
# поедет. Если staging-deploy зелёный, нажимаешь Approve в Actions UI и prod
# получает то же самое.
#
# Для активации manual approval:
# Repo Settings → Environments → New environment "production" →
#   Required reviewers: добавить владельца (denkrupka).
# Без reviewers job просто пройдёт без паузы — это не ломает workflow,
# но лишает страховки. Настройка — за владельцем.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

concurrency:
  group: deploy-supabase
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — staging
  # ---------------------------------------------------------------------------
  deploy_staging:
    name: Stage 1 — Apply to staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: staging

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Apply migrations (staging)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VITE_SUPABASE_URL_TEST: ${{ secrets.VITE_SUPABASE_URL_TEST }}
        run: |
          mkdir -p apps/web
          {
            echo "SUPABASE_ACCESS_TOKEN=$SUPABASE_ACCESS_TOKEN"
            echo "VITE_SUPABASE_URL_TEST=$VITE_SUPABASE_URL_TEST"
          } > apps/web/.env.local
          node scripts/apply-migrations-staging.mjs staging

      - name: Deploy edge functions (staging)
        if: hashFiles('supabase/functions/**') != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VITE_SUPABASE_URL_TEST: ${{ secrets.VITE_SUPABASE_URL_TEST }}
          TARGET: staging
        run: |
          mkdir -p apps/web
          {
            echo "SUPABASE_ACCESS_TOKEN=$SUPABASE_ACCESS_TOKEN"
            echo "VITE_SUPABASE_URL_TEST=$VITE_SUPABASE_URL_TEST"
          } > apps/web/.env.local
          NO_JWT_FUNCTIONS="stripe-webhook telegram-auth send-email process-recurring-expenses telegram-bug-collector send-weekly-digest generate-insights banking-sync banking-expiry-notify messenger-telegram-webhook messenger-meta-webhook"
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            if [ "$name" = "_shared" ]; then continue; fi
            if echo "$NO_JWT_FUNCTIONS" | grep -qw "$name"; then
              echo "Deploying $name (no JWT verification)"
              node scripts/deploy-edge-function.mjs "$name" --no-verify-jwt
            else
              echo "Deploying $name (with JWT verification)"
              node scripts/deploy-edge-function.mjs "$name"
            fi
          done

  # ---------------------------------------------------------------------------
  # Stage 2 — production. Требует прохождения staging + (опц.) approval из
  # GitHub Environment "production".
  # ---------------------------------------------------------------------------
  deploy_production:
    name: Stage 2 — Apply to production (after staging)
    needs: deploy_staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Apply migrations (production)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PROD }}
        run: |
          mkdir -p apps/web
          {
            echo "SUPABASE_ACCESS_TOKEN=$SUPABASE_ACCESS_TOKEN"
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL"
          } > apps/web/.env.local
          node scripts/apply-migrations-staging.mjs prod

      - name: Deploy edge functions (production)
        if: hashFiles('supabase/functions/**') != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PROD }}
          TARGET: prod
        run: |
          mkdir -p apps/web
          {
            echo "SUPABASE_ACCESS_TOKEN=$SUPABASE_ACCESS_TOKEN"
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL"
          } > apps/web/.env.local
          NO_JWT_FUNCTIONS="stripe-webhook telegram-auth send-email process-recurring-expenses telegram-bug-collector send-weekly-digest generate-insights banking-sync banking-expiry-notify messenger-telegram-webhook messenger-meta-webhook"
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            if [ "$name" = "_shared" ]; then continue; fi
            if echo "$NO_JWT_FUNCTIONS" | grep -qw "$name"; then
              echo "Deploying $name (no JWT verification)"
              node scripts/deploy-edge-function.mjs "$name" --no-verify-jwt
            else
              echo "Deploying $name (with JWT verification)"
              node scripts/deploy-edge-function.mjs "$name"
            fi
          done
