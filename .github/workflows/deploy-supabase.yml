name: Deploy Supabase (Migrations + Functions)

# Двухступенчатый pipeline: staging → prod. Раньше prod требовал manual
# approval через GitHub Environment "production" — это было консервативно
# и приводило к застреванию runs'ов на часы. Сейчас approval gate снят
# (см. ниже): staging должен быть зелёным, и тогда prod деплоится сразу.
# Если staging упадёт — prod не поедет. Чтобы вернуть approval-gate,
# Repo Settings → Environments → production → Required reviewers.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

concurrency:
  group: deploy-supabase
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — staging
  # ---------------------------------------------------------------------------
  deploy_staging:
    name: Stage 1 — Apply to staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # environment.name 'staging' тоже убран — он добавлял лишний gate.
    # Если потребуется ручное одобрение для staging, раскомментируй
    # и заведи Required reviewers в Settings → Environments → staging.
    # environment:
    #   name: staging

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - name: Install root deps (pg для pooler-based migrations)
        run: pnpm install --frozen-lockfile

      - name: Apply migrations (staging)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VITE_SUPABASE_URL_TEST: ${{ secrets.VITE_SUPABASE_URL_TEST }}
          # NEW (since 28 May 2026 RO Management API): прямое подключение к
          # Postgres через pooler — Supabase Management API /database/query
          # больше не принимает DDL. Заведи в Repo Settings → Secrets:
          #   SUPABASE_DB_PASSWORD_TEST — DB password staging проекта
          #   SUPABASE_DB_PASSWORD_PROD — DB password prod проекта
          SUPABASE_DB_PASSWORD_TEST: ${{ secrets.SUPABASE_DB_PASSWORD_TEST }}
        run: |
          mkdir -p apps/web
          {
            echo "SUPABASE_ACCESS_TOKEN=$SUPABASE_ACCESS_TOKEN"
            echo "VITE_SUPABASE_URL_TEST=$VITE_SUPABASE_URL_TEST"
          } > apps/web/.env.local
          node scripts/apply-migrations-staging.mjs staging

      - name: Deploy edge functions (staging)
        if: hashFiles('supabase/functions/**') != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VITE_SUPABASE_URL_TEST: ${{ secrets.VITE_SUPABASE_URL_TEST }}
          TARGET: staging
        run: |
          mkdir -p apps/web
          {
            echo "SUPABASE_ACCESS_TOKEN=$SUPABASE_ACCESS_TOKEN"
            echo "VITE_SUPABASE_URL_TEST=$VITE_SUPABASE_URL_TEST"
          } > apps/web/.env.local
          NO_JWT_FUNCTIONS="stripe-webhook telegram-auth telegram-link telegram-bug-collector tester-bug-report ai-seo-helper team-update-member send-email send-notification process-recurring-expenses send-weekly-digest send-daily-digest daily-notifications payment-reminders generate-insights banking-sync banking-expiry-notify messenger-telegram-webhook messenger-meta-webhook instagram-oauth-callback instagram-deauthorize instagram-data-deletion fb-oauth-callback fb-deauthorize fb-data-deletion google-places-photo email-channel-oauth-callback email-channel-pubsub-webhook telegram-user-bot"
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            if [ "$name" = "_shared" ]; then continue; fi
            if echo "$NO_JWT_FUNCTIONS" | grep -qw "$name"; then
              echo "Deploying $name (no JWT verification)"
              node scripts/deploy-edge-function.mjs "$name" --no-verify-jwt
            else
              echo "Deploying $name (with JWT verification)"
              node scripts/deploy-edge-function.mjs "$name"
            fi
          done

  # ---------------------------------------------------------------------------
  # Stage 2 — production. Требует прохождения staging + (опц.) approval из
  # GitHub Environment "production".
  # ---------------------------------------------------------------------------
  deploy_production:
    name: Stage 2 — Apply to production (after staging)
    needs: deploy_staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # environment.name 'production' убран чтобы не висеть на approval gate.
    # Если нужно вернуть ручное одобрение — раскомментируй ниже и заведи
    # Required reviewers в Settings → Environments → production.
    # environment:
    #   name: production

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - name: Install root deps (pg для pooler-based migrations)
        run: pnpm install --frozen-lockfile

      - name: Apply migrations (production)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PROD }}
          SUPABASE_DB_PASSWORD_PROD: ${{ secrets.SUPABASE_DB_PASSWORD_PROD }}
        run: |
          mkdir -p apps/web
          {
            echo "SUPABASE_ACCESS_TOKEN=$SUPABASE_ACCESS_TOKEN"
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL"
          } > apps/web/.env.local
          node scripts/apply-migrations-staging.mjs prod

      - name: Deploy edge functions (production)
        if: hashFiles('supabase/functions/**') != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PROD }}
          TARGET: prod
        run: |
          mkdir -p apps/web
          {
            echo "SUPABASE_ACCESS_TOKEN=$SUPABASE_ACCESS_TOKEN"
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL"
          } > apps/web/.env.local
          NO_JWT_FUNCTIONS="stripe-webhook telegram-auth telegram-link telegram-bug-collector tester-bug-report ai-seo-helper team-update-member send-email send-notification process-recurring-expenses send-weekly-digest send-daily-digest daily-notifications payment-reminders generate-insights banking-sync banking-expiry-notify messenger-telegram-webhook messenger-meta-webhook instagram-oauth-callback instagram-deauthorize instagram-data-deletion fb-oauth-callback fb-deauthorize fb-data-deletion google-places-photo email-channel-oauth-callback email-channel-pubsub-webhook telegram-user-bot"
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            if [ "$name" = "_shared" ]; then continue; fi
            if echo "$NO_JWT_FUNCTIONS" | grep -qw "$name"; then
              echo "Deploying $name (no JWT verification)"
              node scripts/deploy-edge-function.mjs "$name" --no-verify-jwt
            else
              echo "Deploying $name (with JWT verification)"
              node scripts/deploy-edge-function.mjs "$name"
            fi
          done
