name: Deploy Supabase (Migrations + Functions)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

concurrency:
  group: deploy-supabase
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply migrations and deploy edge functions
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Деплоим через Supabase Management API напрямую — supabase CLI 2.98.2
    # пока не понимает новый формат personal access token (sbp_v0_*).
    # Когда CLI догонит — можно вернуть `supabase link` + `db push` + functions deploy.

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Apply migrations (Management API)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          # Скрипт читает VITE_SUPABASE_URL из apps/web/.env.local; в CI задаём
          # через временный env-файл по тому же пути для совместимости.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PROD }}
        run: |
          mkdir -p apps/web
          {
            echo "SUPABASE_ACCESS_TOKEN=$SUPABASE_ACCESS_TOKEN"
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL"
          } > apps/web/.env.local
          node scripts/apply-migrations-staging.mjs prod

      - name: Deploy edge functions (Management API)
        if: hashFiles('supabase/functions/**') != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PROD }}
        run: |
          # _shared/ — не отдельная функция, скрипт сам подтянет если функция импортит
          NO_JWT_FUNCTIONS="stripe-webhook telegram-auth send-email process-recurring-expenses telegram-bug-collector send-weekly-digest"
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            if [ "$name" = "_shared" ]; then continue; fi
            if echo "$NO_JWT_FUNCTIONS" | grep -qw "$name"; then
              echo "Deploying $name (no JWT verification)"
              node scripts/deploy-edge-function.mjs "$name" --no-verify-jwt
            else
              echo "Deploying $name (with JWT verification)"
              node scripts/deploy-edge-function.mjs "$name"
            fi
          done
