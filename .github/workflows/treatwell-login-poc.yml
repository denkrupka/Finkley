name: Treatwell login PoC

# Ручная проверка: проходит ли вход в Treatwell через CloakBrowser с машины
# GitHub Actions (обход Cloudflare Turnstile). Запускается вручную из вкладки
# Actions → "Treatwell login PoC" → Run workflow.
#
# Нужны два секрета репозитория (Settings → Secrets and variables → Actions):
#   TREATWELL_LOGIN     — email аккаунта Treatwell Connect
#   TREATWELL_PASSWORD  — пароль
#
# Опционально можно выбрать headed (по умолчанию — под Xvfb, надёжнее против
# анти-бота) или headless.

on:
  workflow_dispatch:
    inputs:
      headless:
        description: 'Headless режим (false = headed под Xvfb, надёжнее)'
        type: boolean
        default: false

jobs:
  login-check:
    name: Try Treatwell login via CloakBrowser
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Xvfb (для headed-режима)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install PoC deps
        working-directory: scripts/treatwell-poc
        run: npm install --no-package-lock

      - name: Run login check
        working-directory: scripts/treatwell-poc
        env:
          TREATWELL_LOGIN: ${{ secrets.TREATWELL_LOGIN }}
          TREATWELL_PASSWORD: ${{ secrets.TREATWELL_PASSWORD }}
          TREATWELL_HEADLESS: ${{ inputs.headless && '1' || '0' }}
        run: |
          if [ "$TREATWELL_HEADLESS" = "1" ]; then
            node login-check.mjs
          else
            xvfb-run -a --server-args="-screen 0 1920x1080x24" node login-check.mjs
          fi

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: treatwell-login-screenshot
          path: scripts/treatwell-poc/treatwell-login.png
          retention-days: 7
          if-no-files-found: ignore
