name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Отменяем старые runs при новом push в ту же ветку
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck + Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_STAGING || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_STAGING || 'placeholder' }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PK_TEST || 'pk_test_placeholder' }}
          VITE_APP_URL: https://finkley.app
        run: pnpm build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # E2E запускаем только на PR, не на каждый push в main (чтобы не тратить время)
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      # Node 22: нативный global WebSocket. На Node 20 supabase-js падал в e2e
      # с «Node.js 20 detected without native WebSocket support».
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      # Собираем с TEST-env: vite preview (см. playwright.config webServer) отдаёт
      # эту сборку, и приложение должно указывать на тот же Supabase (TEST), где
      # тесты создают юзеров. Раньше собиралось с STAGING → логин-тесты не сходились.
      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_TEST || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_TEST || 'placeholder' }}
        run: pnpm build

      - name: Run Playwright tests
        run: pnpm --filter web exec playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          # Эти тесты используют staging Supabase для создания test-юзеров.
          # Без секретов они автоматически skip — workflow остаётся «зелёным».
          VITE_SUPABASE_URL_TEST: ${{ secrets.VITE_SUPABASE_URL_TEST }}
          VITE_SUPABASE_ANON_KEY_TEST: ${{ secrets.VITE_SUPABASE_ANON_KEY_TEST }}
          SUPABASE_SERVICE_ROLE_KEY_TEST: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_TEST }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
